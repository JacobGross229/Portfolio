<!DOCTYPE html>
<html>
  <head>
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=display-width, initial-scale=1" />
  </head>
  <body>
    <div class="container">
      <div class="intro">
        <img src="https://via.placeholder.com/150" />
        <h1 id="my-name">Jacob Gross</h1>
        <h3>Software Development student</h3>
      </div>
      <div class="about-grid">
        <div class="I-Am">
          <h1>I am</h1>
          <ul class="about-list">
            <li class="I-Am">A software developer student</li>
            <li class="I-Am">Passionate for code</li>
            <li class="I-Am">A huge fan of metal music</li>
          </ul>
        </div>
        <div class="i-like">
          <h1>I like to</h1>
          <ul class="about-list">
            <li class="I-Am">Meet new people</li>
            <li class="I-Am">Travel</li>
            <li class="I-Am">Go to concerts</li>
          </ul>
        </div>
      </div>
      <div>
        <h3 class="projects-heading">My Projects</h3>
        <div class="projects-grid">
          <img class="project-image" src="https://via.placeholder.com/300" />
          <img class="project-image" src="https://via.placeholder.com/300" />
          <img class="project-image" src="https://via.placeholder.com/300" />
          <img class="project-image" src="https://via.placeholder.com/300" />
        </div>
      </div>
      <div class="links-and-contact">
        <div class="links">
          <h3>Links</h3>
          <ul class="links-list">
            <li>
              <a href="https://github.com/">Github</a>
            </li>
            <li>
              <a href="https://linkedin.com">Linkedin</a>
            </li>
          </ul>
        </div>
        <div>
          <form action="#">
            <label for="email">
              Email: <input id="email" placeholder="Enter your email" />
            </label>
            <label for="message">
              message: <textarea id="message">Your Message</textarea>
            </label>
            <input type="Submit" value="Send Message" />
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
